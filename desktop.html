<!DOCTYPE html>
<html lang="pt-br" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <title>Painel MRV SP v9.1</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">DASHBOARD MRV SP - GESTÃO DE ESTOQUE v9.1</div>

<div class="wrapper">
    <aside class="sidebar-esq" id="lista-imoveis">Carregando residenciais...</aside>
    
    <main class="conteudo-centro">
        <div id="cidade-titulo"></div> 
        <div id="caixa-a"></div> 
        <div id="caixa-b"></div> 
    </main>

    <aside class="sidebar-dir" id="ficha-tecnica">
        <div style="text-align:center; color:#ccc; margin-top:100px;">
            <p style="font-size: 30px;">📍</p>
            <p>Selecione um empreendimento</p>
        </div>
    </aside>
</div>

<script src="mrv-data.js"></script>
<script src="mrv-engine.js"></script>
<script>
    function gerarListaLateral() {
        const list = document.getElementById('lista-imoveis');
        if (!list) return;
        list.innerHTML = "";
        
        DADOS_PLANILHA.forEach(item => {
            // Ignora itens que não tenham nome ou tenham erro de coluna
            if (!item.nome || item.nome === "Erro na Linha") return;

            if (item.tipo === 'N') {
                const div = document.createElement('div');
                div.className = "notranslate";
                div.style = "background:#333; color:white; padding:8px; font-size:0.72rem; text-align:center; margin:15px 0 5px 0; border-radius:4px; font-weight:bold; text-transform:uppercase;";
                div.innerText = item.nome; 
                list.appendChild(div);
            } else {
                const btn = document.createElement('button');
                btn.className = `btRes notranslate`;
                const idLimpo = item.nome.replace(/[^a-zA-Z0-9]/g, '-');
                btn.id = `btn-esq-${idLimpo}`;
                btn.innerHTML = `<strong class="notranslate">${item.nome}</strong> ${obterHtmlEstoque(item.estoque, item.tipo)}`;
                btn.onclick = () => comandoSelecao(item.id_path, item.cidade, item);
                list.appendChild(btn);
            }
        });
    }
    window.onload = iniciarApp;
</script>
</body>
</html>
