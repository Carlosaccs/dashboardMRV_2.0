<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard MRV SP - Desktop</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Apenas ajustes de layout específicos do Desktop */
        body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: var(--mrv-verde); color: white; padding: 10px; text-align: center; font-weight: bold; }
        .wrapper { display: flex; flex: 1; overflow: hidden; }
        .sidebar-esq { width: 22%; border-right: 1px solid var(--cinza-borda); overflow-y: auto; padding: 10px; background: var(--cinza-fundo); }
        .conteudo-centro { flex: 1; display: flex; flex-direction: column; position: relative; }
        .mapa-container { flex: 1; position: relative; }
        .sidebar-dir { width: 30%; border-left: 1px solid var(--cinza-borda); overflow-y: auto; padding: 20px; }
        
        .ficha-header h2 { color: var(--mrv-verde); margin-bottom: 5px; }
        .ficha-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .info-box { background: #f4f4f4; padding: 10px; border-radius: 4px; font-size: 0.85rem; }
        .info-box label { display: block; font-size: 0.65rem; color: #888; text-transform: uppercase; font-weight: bold; }
        .btn-link { display: inline-block; padding: 8px 15px; background: var(--mrv-verde); color: white; text-decoration: none; border-radius: 4px; font-size: 0.8rem; margin: 5px 5px 0 0; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">DASHBOARD MRV SP - GESTÃO DE ESTOQUE</div>

<div class="wrapper">
    <aside class="sidebar-esq" id="lista-imoveis">Carregando...</aside>
    
    <main class="conteudo-centro">
        <div id="cidade-titulo" style="padding:10px; text-align:center; font-weight:bold; background:#eee;">Selecione uma cidade no mapa</div>
        <div class="mapa-container" id="container-mapas">
            <div id="caixa-a" style="height: 100%;"></div>
        </div>
    </main>

    <aside class="sidebar-dir" id="ficha-tecnica">
        <p style="color:#999; text-align:center; margin-top:50px;">Selecione um residencial para ver os detalhes.</p>
    </aside>
</div>

<div id="toast">Copiado!</div>

<script src="mrv-data.js"></script>
<script src="mrv-engine.js"></script>
<script>
    function gerarListaLateral() {
        const list = document.getElementById('lista-imoveis');
        list.innerHTML = "";
        DADOS_PLANILHA.forEach(item => {
            if (item.tipo === 'N') {
                const div = document.createElement('div');
                div.className = 'item-grupo';
                div.innerText = item.nome;
                list.appendChild(div);
            } else {
                const btn = document.createElement('button');
                btn.className = `btRes tipo-${item.tipo}`;
                btn.innerHTML = `<div><strong>${item.nome}</strong><br><small>${item.cidade}</small></div> ${obterHtmlEstoque(item.estoque, item.tipo)}`;
                btn.onclick = () => selecionar(item, btn);
                list.appendChild(btn);
            }
        });
        desenharIniciais();
    }

    function selecionar(item, btn) {
        document.querySelectorAll('.btRes').forEach(b => b.classList.remove('ativo'));
        btn.classList.add('ativo');

        const path = document.getElementById(item.id_path);
        if(path) {
            if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
            path.classList.add('path-ativo');
            pathSelecionado = path;
            document.getElementById('cidade-titulo').innerText = path.getAttribute('name');
        }

        document.getElementById('ficha-tecnica').innerHTML = `
            <div class="ficha-header">
                <h2>${item.nome}</h2>
                <p>📍 <strong>${item.bairro}</strong><br><small>${item.endereco}</small></p>
            </div>
            <div class="ficha-grid">
                <div class="info-box"><label>💰 Preço</label>${item.preco}</div>
                <div class="info-box"><label>🔑 Entrega</label>${item.entrega}</div>
                <div class="info-box"><label>📐 Plantas</label>${item.plantas}</div>
                <div class="info-box"><label>🏗️ Obra</label>${item.obra}%</div>
            </div>
            <div class="info-box" style="margin-bottom:10px;"><label>💡 Dica do Corretor</label>${item.dica}</div>
            <div style="margin-top:20px;">
                ${item.links.bookCli ? `<a href="${item.links.bookCli}" target="_blank" class="btn-link">📄 Book Cliente</a>` : ''}
                ${item.links.vid1 ? `<a href="${item.links.vid1}" target="_blank" class="btn-link" style="background:var(--mrv-laranja)">🎥 Vídeo</a>` : ''}
            </div>
        `;
    }

    window.onload = iniciarApp;
</script>
</body>
</html>
