<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard MRV SP v6.9</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">DASHBOARD MRV SP - GESTÃO DE ESTOQUE v6.9</div>

<div class="wrapper">
    <aside class="sidebar-esq" id="lista-imoveis">Carregando residenciais...</aside>
    
    <main class="conteudo-centro">
        <div id="cidade-titulo"></div> 
        <div id="caixa-a"></div> 
        <div id="caixa-b"></div> 
    </main>

    <aside class="sidebar-dir" id="ficha-tecnica">
        <div style="text-align:center; color:#ccc; margin-top:100px;">
            <p style="font-size: 30px;">📍</p>
            <p>Selecione um complexo ou residencial.</p>
        </div>
    </aside>
</div>

<script src="mrv-data.js"></script>
<script src="mrv-engine.js"></script>
<script>
    function gerarListaLateral() {
        const list = document.getElementById('lista-imoveis');
        if (!list) return;
        list.innerHTML = "";
        
        // Mantém a ordem da planilha (que já deve estar alfabética)
        DADOS_PLANILHA.forEach(item => {
            const btn = document.createElement('button');
            
            // Se for Tipo N, ganha um estilo de destaque preto, senão estilo padrão
            if (item.tipo === 'N') {
                btn.className = `btRes`;
                btn.style = "background:#333 !important; color:white !important; border-left: 4px solid var(--mrv-laranja); margin-top:10px; margin-bottom:10px; font-weight:bold;";
                btn.innerHTML = `<span>🏢 ${item.nome.toUpperCase()}</span>`;
            } else {
                btn.className = `btRes`;
                btn.innerHTML = `<strong>${item.nome}</strong> ${obterHtmlEstoque(item.estoque, item.tipo)}`;
            }

            btn.id = `btn-esq-${item.nome.replace(/[^a-zA-Z0-9]/g, '-')}`;
            btn.onclick = () => comandoSelecao(item.id_path, item.cidade, item);
            list.appendChild(btn);
        });
    }
    window.onload = iniciarApp;
</script>
</body>
</html>
