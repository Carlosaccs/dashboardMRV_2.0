<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard MRV SP v7.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">DASHBOARD MRV SP - GESTÃO DE ESTOQUE v7.0</div>

<div class="wrapper">
    <aside class="sidebar-esq" id="lista-imoveis">Carregando...</aside>
    
    <main class="conteudo-centro">
        <div id="cidade-titulo"></div> 
        <div id="caixa-a"></div> 
        <div id="caixa-b"></div> 
    </main>

    <aside class="sidebar-dir" id="ficha-tecnica">
        <div style="text-align:center; color:#ccc; margin-top:100px;">
            <p style="font-size: 30px;">📍</p>
            <p>Selecione um complexo ou residencial.</p>
        </div>
    </aside>
</div>

<script src="mrv-data.js"></script>
<script src="mrv-engine.js"></script>
<script>
    function gerarListaLateral() {
        const list = document.getElementById('lista-imoveis');
        if (!list) return;
        list.innerHTML = "";
        
        // 1. SEPARAÇÃO E ORDENAÇÃO:
        // Primeiro colocamos os itens de "Tipo N" no topo.
        const itensN = DADOS_PLANILHA.filter(i => i.tipo === 'N').sort((a,b) => a.nome.localeCompare(b.nome));
        const itensR = DADOS_PLANILHA.filter(i => i.tipo !== 'N').sort((a,b) => a.nome.localeCompare(b.nome));
        
        const listaOrdenada = [...itensN, ...itensR];

        listaOrdenada.forEach(item => {
            const btn = document.createElement('button');
            btn.className = `btRes`;
            
            if (item.tipo === 'N') {
                // Estilo "Super Botão" mas com cores padrão para aceitar o ativo laranja
                btn.innerHTML = `<span style="color:var(--mrv-verde); font-weight:bold;">🏢 ${item.nome.toUpperCase()}</span>`;
            } else {
                btn.innerHTML = `<strong>${item.nome}</strong> ${obterHtmlEstoque(item.estoque, item.tipo)}`;
            }

            btn.id = `btn-esq-${item.nome.replace(/[^a-zA-Z0-9]/g, '-')}`;
            btn.onclick = () => comandoSelecao(item.id_path, item.cidade, item);
            list.appendChild(btn);
        });
    }
    window.onload = iniciarApp;
</script>
</body>
</html>
