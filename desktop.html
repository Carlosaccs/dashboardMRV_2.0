<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard MRV SP v6.0</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: var(--mrv-verde); color: white; padding: 10px; text-align: center; font-weight: bold; }
        .wrapper { display: flex; flex: 1; overflow: hidden; }
        .sidebar-esq { width: 20%; border-right: 1px solid var(--cinza-borda); overflow-y: auto; padding: 10px; background: var(--cinza-fundo); }
        
        /* AJUSTE DE PROPORÇÃO DOS MAPAS */
        .conteudo-centro { flex: 1; display: flex; flex-direction: column; }
        #caixa-a { flex: 1.25; border-bottom: 2px solid #eee; padding: 10px; } /* Aumentado em 25% */
        #caixa-b { flex: 0.6; padding: 5px; opacity: 0.8; pointer-events: none; } /* Diminuído 40% e sem clique */
        
        .sidebar-dir { width: 30%; border-left: 1px solid var(--cinza-borda); overflow-y: auto; padding: 15px; }
        #cidade-titulo { background: #eee; padding: 8px; text-align: center; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="header">DASHBOARD MRV SP - GESTÃO DE ESTOQUE v6.0</div>

<div class="wrapper">
    <aside class="sidebar-esq" id="lista-imoveis">Carregando...</aside>
    
    <main class="conteudo-centro">
        <div id="cidade-titulo">Selecione uma região</div>
        <div id="caixa-a"></div> <div id="caixa-b"></div> </main>

    <aside class="sidebar-dir" id="ficha-tecnica">
        <div style="text-align:center; color:#ccc; margin-top:100px;">
            <p style="font-size: 40px;">📍</p>
            <p>Clique no mapa principal para ver os empreendimentos.</p>
        </div>
    </aside>
</div>

<script src="mrv-data.js"></script>
<script src="mrv-engine.js"></script>
<script>
    function gerarListaLateral() {
        const list = document.getElementById('lista-imoveis');
        list.innerHTML = "";
        DADOS_PLANILHA.forEach(item => {
            if (item.tipo === 'N') {
                list.innerHTML += `<div class="item-grupo">${item.nome}</div>`;
            } else {
                const btn = document.createElement('button');
                btn.className = `btRes`;
                btn.id = `btn-esq-${item.nome.replace(/[^a-zA-Z0-9]/g, '-')}`;
                btn.innerHTML = `<strong>${item.nome}</strong> ${obterHtmlEstoque(item.estoque, item.tipo)}`;
                btn.onclick = () => {
                    const cidade = DADOS_PLANILHA.filter(i => i.id_path === item.id_path);
                    const path = document.getElementById(`caixa-a-${item.id_path}`);
                    if(path) destacarNoMapa(path);
                    montarVitrine(item, cidade);
                };
                list.appendChild(btn);
            }
        });
        desenharIniciais();
    }
    window.onload = iniciarApp;
</script>
</body>
</html>
