<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard MRV SP v6.1</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ajuste de altura específico das caixas */
        #caixa-a { flex: 1.25; border-bottom: 2px solid #eee; overflow: hidden; position: relative; }
        #caixa-b { flex: 0.6; overflow: hidden; opacity: 0.8; position: relative; }
    </style>
</head>
<body>

<div class="header">DASHBOARD MRV SP - GESTÃO DE ESTOQUE v6.1</div>

<div class="wrapper">
    <aside class="sidebar-esq" id="lista-imoveis">Carregando residenciais...</aside>
    
    <main class="conteudo-centro">
        <div id="cidade-titulo">SELECIONE UMA REGIÃO NO MAPA</div>
        <div class="mapa-container">
            <div id="caixa-a"></div> <div id="caixa-b"></div> </div>
    </main>

    <aside class="sidebar-dir" id="ficha-tecnica">
        <div style="text-align:center; color:#ccc; margin-top:100px;">
            <p style="font-size: 30px;">📍</p>
            <p>Clique no mapa principal para ver os empreendimentos.</p>
        </div>
    </aside>
</div>

<script src="mrv-data.js"></script>
<script src="mrv-engine.js"></script>
<script>
    function gerarListaLateral() {
        const list = document.getElementById('lista-imoveis');
        list.innerHTML = "";
        DADOS_PLANILHA.forEach(item => {
            if (item.tipo === 'N') {
                const div = document.createElement('div');
                div.style = "background:#333; color:white; padding:5px; font-size:0.65rem; text-align:center; margin:10px 0; border-radius:4px;";
                div.innerText = item.nome;
                list.appendChild(div);
            } else {
                const btn = document.createElement('button');
                btn.className = `btRes`;
                btn.id = `btn-esq-${item.nome.replace(/[^a-zA-Z0-9]/g, '-')}`;
                btn.innerHTML = `<strong>${item.nome}</strong> ${obterHtmlEstoque(item.estoque, item.tipo)}`;
                btn.onclick = () => {
                    const cidade = DADOS_PLANILHA.filter(i => i.id_path === item.id_path);
                    const path = document.getElementById(`caixa-a-${item.id_path}`);
                    if(path) cliqueNoMapa(item.id_path, path.getAttribute('name'));
                    montarVitrine(item, cidade, item.cidade);
                };
                list.appendChild(btn);
            }
        });
    }
    // Inicia o app
    window.onload = iniciarApp;
</script>
</body>
</html>
